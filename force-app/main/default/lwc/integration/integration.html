<template>
    <lightning-card> 
        <div class="slds-grid slds-m-vertical_small slds-m-horizontal_large">
            <div class="slds-col">
                <div class="slds-grid">
                    <div class="slds-text-heading_medium slds-text-color_default">Org connections</div>
                    <template if:true={orgConnectionList.length}>
                        <div class="slds-m-left_medium slds-m-vertical_x-small slds-text-heading_small">
                            {orgConnectionList.length} orgs
                        </div>
                    </template>
                </div>
            </div>
            
            <div class="slds-col slds-text-align_right">
                <button class="button-new-org" onclick={handleModal}>+ New org connection</button>
            </div>
        </div>

        <div class="slds-m-horizontal_large">
            <input type="search" placeholder="Search orgs..." class="search" value={searchQuery} oninput={handleSearchChange} />
        </div>

        <template if:false={orgConnectionList.length}>
            <div class="empty">
                <p>No org connections yet</p>
                <p class="second-row">Click "New org connection" to link your first org</p>
            </div>
        </template>

        <template if:true={orgConnectionList.length}>
            <div class="container">
                <template for:each={processedList} for:item="orgConnection">
                    <div key={orgConnection.Id} class="card">

                        <div class="card-top">
                            <h3 class="card-name">{orgConnection.Org_Name__c}</h3>
                            <span class={orgConnection.statusSpanClass}>
                                <lightning-icon icon-name={orgConnection.statusIcon} size="x-small"></lightning-icon>
                                {orgConnection.Status__c}
                            </span>
                        </div>

                        <div class="card-type">{orgConnection.Type__c}</div>

                        <div class="card-info">
                            <div class="info-row">
                                <lightning-icon icon-name="utility:http" size="x-small"></lightning-icon>
                                <span>{orgConnection.Login_Url__c}</span>
                            </div>
                            <template if:false={orgConnection.isStatusNotLinked}>
                                <div class="info-row">
                                    <lightning-icon icon-name="utility:profile_alt" size="x-small"></lightning-icon>
                                    <span>{orgConnection.UserName__c}</span>
                                </div>
                            </template>

                            <template if:true={orgConnection.isStatusFailed}>
                                <p class="error-msg">Token invalid — org may be expired</p>
                            </template>
                        </div>
                        
                        <div class="card-buttons">
                            <template if:true={orgConnection.isStatusConnected}>
                                <button 
                                    class="btn" 
                                    onclick={handleDeleteOrgConnection} 
                                    data-org-id={orgConnection.Id} 
                                    data-org-name={orgConnection.Org_Name__c}>
                                    <lightning-icon icon-name="utility:delete" size="xx-small"></lightning-icon>
                                    Delete
                                </button>
                                <button 
                                    class="btn"
                                    onclick={handleDisconnectOrgConnection} 
                                    data-org-id={orgConnection.Id} 
                                    data-org-name={orgConnection.Org_Name__c}>
                                    <lightning-icon icon-name="utility:lock" size="xx-small"></lightning-icon>
                                    Disconnect
                                </button>
                                <button class="btn btn-primary">
                                    <lightning-icon icon-name="utility:forward_up" size="xx-small"></lightning-icon>
                                    Open org
                                </button>
                            </template>

                            <template if:true={orgConnection.isStatusFailed}>
                                <button 
                                    class="btn" 
                                    onclick={handleDeleteOrgConnection} 
                                    data-org-id={orgConnection.Id} 
                                    data-org-name={orgConnection.Org_Name__c}>
                                    <lightning-icon icon-name="utility:delete" size="xx-small"></lightning-icon>
                                    Delete
                                </button>
                                <button class="btn">
                                    <lightning-icon icon-name="utility:refresh" size="xx-small"></lightning-icon>
                                    Re-authorize
                                </button>
                            </template>

                            <template if:true={orgConnection.isStatusNotLinked}>
                                <button 
                                    class="btn" 
                                    onclick={handleDeleteOrgConnection} 
                                    data-org-id={orgConnection.Id} 
                                    data-org-name={orgConnection.Org_Name__c}>
                                    <lightning-icon icon-name="utility:delete" size="xx-small"></lightning-icon>
                                    Delete
                                </button>
                                <button class="btn btn-primary">
                                    <lightning-icon icon-name="utility:key" size="xx-small"></lightning-icon>
                                    Authorize
                                </button>
                            </template>
                        </div>
                    </div> 
                </template>
            </div>
        </template>
    </lightning-card>

    <template if:true={showModal}>
        <section role="dialog" tabindex="-1" 
                aria-labelledby="modal-heading" 
                aria-modal="true"
                class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <div class="overlay">
                    <div class="modal">
                        <div class="modal-header">
                            <span>New org connection</span>
                            <span class="close" onclick={handleCloseModal}>✕</span>
                        </div>

                        <div class="modal-body">
                            <lightning-record-edit-form object-api-name="Org_Connection__c">
                                <lightning-input 
                                    type="text" 
                                    label="Org name" 
                                    data-id="orgName"
                                    placeholder="e.g. Meridian Bank Scratch" 
                                    value={orgConnection.orgName} 
                                    onchange={handleOrgNameChange}
                                    required
                                    class="field"
                                ></lightning-input>

                                <lightning-combobox
                                    label="Type"
                                    data-id="type"
                                    value={orgConnection.type}
                                    options={typeOptions}
                                    onchange={handleOrgTypeChange}
                                    class="field"
                                ></lightning-combobox>

                                <lightning-input 
                                    type="text" 
                                    label="Login URL" 
                                    data-id="loginUrl"
                                    placeholder="e.g. https://test.salesforce.com" 
                                    value={orgConnection.loginUrl} 
                                    onchange={handleOrgLoginUrlChange}
                                    class="field"
                                ></lightning-input>
                            </lightning-record-edit-form>
                            <p class="hint">At least one of Type or Login URL must be filled</p>
                            <div class="actions">
                                <button class="btn" onclick={handleCloseModal}>Cancle</button>
                                <button class="btn btn-primary" onclick={handleAddOrgConnection}>Save & authorize</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
